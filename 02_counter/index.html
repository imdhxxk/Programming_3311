<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="counter">0</p>
    <button onclick="plus()">+</button>
    <button onclick="minus()">-</button>
    <script>
        let num = 0;
        function plus(){
            let count = document.getElementById("counter")
            num++
            count.innerText=num
        }
        function minus(){
            let count = document.getElementById("counter")
            if(num<=0){
                num=0
            }else{
                num--
            }
            count.innerText=num;
        }
    </script>
</body>
</html>
